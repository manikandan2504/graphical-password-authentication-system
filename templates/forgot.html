<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>

    <style>

    body{
        background:#121212;
        color:white;
        font-family:Arial;

        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .box{
        width:450px;
        background:#1e1e1e;
        padding:30px;
        border-radius:10px;
        text-align:center;
        box-shadow:0px 0px 15px cyan;
    }

    img{
        width:100px;
        height:100px;
        border-radius:10px;
        margin:10px;
        cursor:pointer;
        border:2px solid transparent;
        transition:0.3s;
    }

    img:hover{
        border:2px solid cyan;
        transform:scale(1.05);
    }

    button{
        padding:10px 20px;
        background:cyan;
        color:black;
        border:none;
        border-radius:5px;
        cursor:pointer;
        font-size:16px;
        transition:0.3s;
    }

    button:hover{
        transform:scale(1.05);
    }

    input[type="text"],
    input[type="password"]{
        padding:10px;
        width:80%;
        border-radius:5px;
        border:1px solid cyan;
        background:#2a2a2a;
        color:white;
    }

    h3{
        color:orange;
    }

    .image-box{
        display:flex;
        justify-content:center;
        gap:20px;
        flex-wrap:wrap;
    }

    .image-box label{
        text-align:center;
    }

</style>

</head>

<body>

<div class="box">

    <h2>Forgot Password</h2>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <br><br>

        <input type="password"
               name="new_password"
               placeholder="New Password"
               required>

        <br><br>

        <h3>Select Graphical Password</h3>

        <div class="image-box">

            <label>
                <img src="/static/images/cat.jpg">
                <br>
                <input type="radio"
                       name="graphical"
                       value="cat"
                       required>
            </label>

            <label>
                <img src="/static/images/car.jpg">
                <br>
                <input type="radio"
                       name="graphical"
                       value="car">
            </label>

            <label>
                <img src="/static/images/flower.jpg">
                <br>
                <input type="radio"
                       name="graphical"
                       value="flower">
            </label>

        </div>

        <br><br>

        <h3>{{ message }}</h3>

        <button type="submit">Reset Password</button>

    </form>

</div>

</body>

</html>
