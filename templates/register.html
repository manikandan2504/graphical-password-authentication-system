<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <style>

        body{
            background:#121212;
            color:white;
            font-family:Arial;

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;

            margin:0;
            padding:20px;
        }

        .box{

            width:90%;
            max-width:450px;

            background:#1e1e1e;

            padding:30px;

            border-radius:10px;

            text-align:center;

            box-shadow:0px 0px 15px cyan;
        }

        img{

            width:80px;
            height:80px;

            border-radius:10px;

            margin:10px;

            cursor:pointer;

            border:2px solid transparent;

            transition:0.3s;
        }

        img:hover{

            border:2px solid cyan;

            transform:scale(1.05);
        }

        button{

            padding:10px 20px;

            background:cyan;

            color:black;

            border:none;

            border-radius:5px;

            cursor:pointer;

            font-size:16px;

            transition:0.3s;
        }

        button:hover{

            transform:scale(1.05);
        }

        input[type="text"],
        input[type="password"],
        input[type="email"]{

            padding:10px;

            width:80%;

            border-radius:5px;

            border:1px solid cyan;

            background:#2a2a2a;

            color:white;

            outline:none;
        }

        h3{
            color:orange;
        }

        .image-box{

            display:flex;

            justify-content:center;

            gap:20px;

            flex-wrap:wrap;
        }

        .image-box label{
            text-align:center;
        }

        @media screen and (max-width:600px){

            .box{
                padding:20px;
            }

            img{
                width:70px;
                height:70px;
            }

            h2{
                font-size:20px;
            }

            input[type="text"],
            input[type="password"],
            input[type="email"]{
                width:90%;
            }

        }

    </style>

</head>

<body>

<div class="box">

    <h2>Graphical Password Register</h2>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <br><br>

        <input type="email"
               name="email"
               placeholder="Enter Email"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <br><br>

        <h3>Select Graphical Password</h3>

        <div class="image-box">

            <label>

                <img src="/static/images/cat.jpg">

                <br>

                <input type="radio"
                       name="graphical"
                       value="cat"
                       required>

            </label>

            <label>

                <img src="/static/images/car.jpg">

                <br>

                <input type="radio"
                       name="graphical"
                       value="car">

            </label>

            <label>

                <img src="/static/images/flower.jpg">

                <br>

                <input type="radio"
                       name="graphical"
                       value="flower">

            </label>

        </div>

        <br><br>

        <h3>{{ message }}</h3>

        <button type="submit">Register</button>

    </form>

</div>

</body>

</html>
